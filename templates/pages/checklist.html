<!DOCTYPE html>
<html lang="nl">

<head>
  <!-- include:head -->
  <title>{{pageTitle}}</title>
</head>

<body class="font-sans antialiased">
  <div data-page-content>
    <main class="px-4 py-10 md:px-10">
      <div class="mx-auto max-w-3xl">
        <div class="mb-8">
          <h1 class="text-3xl font-semibold tracking-tight text-ink">Skills Checklist</h1>
          <p class="mt-2 text-muted">Vink af wat je beheerst. Je voortgang wordt lokaal opgeslagen in je browser.</p>
        </div>
        <div class="card mb-8">
          <div class="mb-2 flex items-center justify-between">
            <span class="text-sm font-medium text-ink/80">Voortgang</span>
            <span data-checklist-progress-label
                  class="text-sm font-mono text-ink">0 / 0 (0%)</span>
          </div>
          <div class="progress-track">
            <div data-checklist-progress
                 class="progress-fill"
                 style="width: 0%"></div>
          </div>
        </div>
        <div data-checklist
             class="space-y-6"></div>
      </div>
    </main>
  </div>
  <script type="module">
    import { initPage } from '/src/js/nav.js'
    import { initChecklist, initChecklistExport } from '/src/js/checklist.js'
    initPage({ breadcrumbs: [{ label: 'Home', href: '/index.html' }, { label: 'Checklist' }] })
    initChecklist()
    initChecklistExport()
  </script>
</body>

</html>
