<!DOCTYPE html>
<html lang="nl">

<head>
  <!-- include:head -->
  <title>{{pageTitle}}</title>
</head>

<body class="font-sans antialiased">
  <div data-page-content>
    <main class="px-4 py-10 md:px-10"
          data-exercise-content>
      <div class="mx-auto max-w-6xl">
        <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
          <div>
            <span data-difficulty
                  class="badge mb-2 block"></span>
            <h1 data-exercise-title
                class="text-2xl font-bold text-ink md:text-3xl"></h1>
            <p data-exercise-desc
               class="mt-2 text-muted"></p>
          </div>

          <div class="flex flex-wrap gap-2">
            <button data-mark-complete
                    type="button"
                    class="btn-secondary">Markeer als voltooid</button>
            <a data-prev-exercise
               href="#"
               class="btn-secondary hidden">← Vorige</a>
            <a href="{{dirName}}-oefeningen.html"
               class="btn-secondary">Overzicht</a>
            <a data-next-exercise
               href="#"
               class="btn-primary hidden">Volgende →</a>
          </div>
        </div>

        <div data-exercise-description
             class="prose-theory hidden"></div>

        <div data-exercise-external
             class="hidden space-y-4">
          <div class="card border-l-4 border-l-primary">
            <p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-muted">Opdracht</p>

            <div data-external-task
                 class="mt-3 text-sm leading-relaxed text-ink/80"></div>

            <div data-external-steps></div>
          </div>

          <div class="card bg-surface-subtle">
            <p class="text-sm font-medium text-ink">Waar werk je?</p>

            <p data-external-environment
               class="mt-2 text-sm text-muted"></p>

            <div data-external-deliverables></div>
          </div>

          <p class="text-sm text-muted">Deze opdracht voer je uit buiten deze website — in je editor, op je machine of in de aangegeven tool.</p>
        </div>

        <div data-exercise-interactive>
          <div data-responsive-bar
               class="mb-4 hidden flex flex-wrap items-center gap-2">

            <span class="text-sm text-muted">Viewport:</span>

            <button data-viewport="desktop"
                    type="button"
                    class="btn-primary">Desktop</button>

            <button data-viewport="tablet"
                    type="button"
                    class="btn-secondary">Tablet</button>

            <button data-viewport="mobile"
                    type="button"
                    class="btn-secondary">Mobiel</button>

            <span data-viewport-label
                  class="text-sm text-muted"></span>
          </div>

          <div data-exercise-css-panel
               class="grid gap-4 lg:grid-cols-2">
            <div class="editor-panel">
              <div class="panel-header">CSS Editor</div>

              <div data-editor
                   class="monaco-container"></div>
            </div>

            <div class="preview-panel">
              <div class="panel-header">Preview</div>

              <iframe data-preview
                      class="preview-frame"
                      title="Preview"></iframe>
            </div>
          </div>

          <div data-exercise-js-panel
               class="hidden grid gap-4 lg:grid-cols-2">
            <div class="editor-panel">
              <div class="panel-header flex items-center justify-between">
                <span>JS Editor</span>

                <button data-run
                        type="button"
                        class="btn-secondary">▶ Uitvoeren</button>
              </div>

              <div data-editor
                   class="monaco-container"></div>
            </div>

            <div class="preview-panel js-output-panel">
              <div class="panel-header flex items-center justify-between">
                <span>Output</span>

                <button data-clear-output
                        type="button"
                        class="btn-secondary">✕ Wissen</button>
              </div>

              <div data-js-output
                   class="js-output"></div>

              <div data-js-sandbox
                   class="hidden"></div>
            </div>
          </div>

          <div data-exercise-areas-panel
               class="hidden space-y-4">
            <div class="card">
              <label class="block text-sm font-medium text-ink/80">grid-template-areas</label>

              <textarea data-areas-container
                        class="mt-2 w-full border border-ink/15 p-3 font-mono text-sm"
                        rows="5"></textarea>

              <div data-area-selects
                   class="space-y-2"></div>
            </div>

            <div class="card">
              <h3 class="mb-4 text-sm font-medium text-muted">Live preview</h3>

              <div data-areas-preview></div>
            </div>
          </div>
        </div>

        <div data-exercise-actions
             class="mb-4 mt-6 flex flex-wrap gap-2">
          <button data-hint
                  type="button"
                  class="btn-secondary">Toon hint</button>

          <button data-solution
                  type="button"
                  class="btn-secondary"
                  data-solution-label>Toon oplossing</button>

          <button data-check
                  type="button"
                  class="btn-primary"
                  data-check-label>Controleer</button>
        </div>

        <div data-feedback
             class="mb-4 feedback-box hidden"></div>
      </div>
    </main>
  </div>

  <div data-theory-panel class="theory-panel panel-hidden">
    <div class="theory-panel-header">
      <div data-theory-tabs class="theory-panel-tabs"></div>
      <button data-theory-panel-close
              type="button"
              class="theory-panel-close"
              aria-label="Sluit theorievenster">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <div class="theory-panel-body">
      <div data-theory-loader class="theory-panel-loader">
        <div class="theory-panel-spinner"></div>
      </div>
      <iframe data-theory-iframe
              class="theory-panel-iframe"
              title="Theorie"></iframe>
    </div>
  </div>

  <button data-theory-toggle
          type="button"
          class="theory-panel-toggle hidden"
          aria-label="Toon theorie"
          aria-expanded="false">
    <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.966 8.966 0 0 0-6 2.292m0-14.25v14.25" /></svg>
    Theorie
  </button>

  <script type="module">
    import { initPage } from '/src/js/nav.js'
    import { initExercisePage } from '/src/js/exercises/load-exercise.js'

    const id = new URLSearchParams(location.search).get('id') || '1'

    initPage({ breadcrumbs: [{ label: 'Home', href: '/index.html' }, { label: '{{sectionLabel}}', href: '/pages/{{dirName}}-oefeningen.html' }, { label: `Oefening ${id}` }] })

    initExercisePage('{{ dirName }}')
  </script>
</body>

</html>
